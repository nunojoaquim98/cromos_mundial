<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coleção Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #080c16;
  --surface: #0f1520;
  --surface2: #161e2e;
  --surface3: #1d2840;
  --border: #1e2d47;
  --border2: #253550;
  --gold: #f5c518;
  --gold-dim: #7a6108;
  --green: #22c55e;
  --green-dim: #0d3320;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #a855f7;
  --text: #dce6f5;
  --text2: #8fa5c8;
  --muted: #4a5f80;
}

* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

/* ─── VIEWS ─── */
.view { display: none; }
.view.active { display: block; }

/* ─── HEADER ─── */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,12,22,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; color: var(--text2); cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem;
  letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.15s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }
.logo {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
  letter-spacing: 0.1em; color: var(--gold); cursor: pointer; line-height: 1;
}
.logo:hover { opacity: 0.8; }
.header-stats { display: flex; gap: 18px; }
.hstat { text-align: center; }
.hstat-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; line-height: 1; }
.hstat-l { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.hstat.h .hstat-n { color: var(--green); }
.hstat.m .hstat-n { color: var(--red); }
.hstat.r .hstat-n { color: var(--gold); }
.hstat.p .hstat-n { color: var(--blue); }

/* ─── PROGRESS ─── */
.prog-bar-wrap { height: 4px; background: var(--surface2); }
.prog-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green) 0%, var(--gold) 100%); transition: width .4s ease; }

/* ─── MAIN CONTROLS ─── */
.controls {
  padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid var(--border);
}
.filter-btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }
.search-wrap { margin-left: auto; position: relative; }
.search-input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 12px 6px 30px; border-radius: 5px;
  font-family: 'Barlow', sans-serif; font-size: 0.85rem; width: 190px; transition: border .15s;
}
.search-input:focus { outline: none; border-color: var(--gold); }
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.8rem; pointer-events: none; }

/* ─── SECTION ─── */
main { padding: 24px; max-width: 1440px; margin: 0 auto; }
.sec-head {
  font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.2em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sec-head small { font-size: 0.75rem; }

/* ─── COUNTRY CARDS GRID ─── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 32px; }

.ccard {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 12px 12px; cursor: pointer; transition: all 0.18s;
  position: relative; overflow: hidden; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.ccard::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--border); transition: background 0.2s;
}
.ccard:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.ccard:hover::after { background: var(--gold); }
.ccard.complete { border-color: #1a3d28; background: #0a1810; }
.ccard.complete::after { background: var(--green); }
.ccard.partial::after { background: var(--gold); }
.ccard-flag { font-size: 2.2rem; line-height: 1; }
.ccard-icon { font-size: 1.8rem; }
.ccard-name { font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; line-height: 1.2; }
.ccard-code { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; }
.ccard-prog { width: 100%; margin-top: 4px; }
.ccard-prog-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.ccard-prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); border-radius: 2px; transition: width 0.3s; }
.ccard-prog-txt { font-size: 0.64rem; color: var(--muted); margin-top: 3px; font-family: 'Barlow Condensed', sans-serif; }
.ccard-repeats {
  position: absolute; top: 7px; right: 7px;
  background: var(--gold); color: #000;
  font-family: 'Bebas Neue', sans-serif; font-size: 0.68rem;
  padding: 1px 5px; border-radius: 3px; line-height: 1.5;
}

/* ─── DETAIL VIEW ─── */
.detail-hero {
  background: linear-gradient(135deg, var(--surface) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 24px 24px;
  display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap;
}
.detail-flag { font-size: 4rem; line-height: 1; padding-top: 4px; }
.detail-info { flex: 1; min-width: 220px; }
.detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 0.06em; line-height: 1; }
.detail-code { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.detail-meta { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.dmeta {
  text-align: center; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 18px;
}
.dmeta-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; }
.dmeta-l { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.dmeta.dh .dmeta-n { color: var(--green); }
.dmeta.dm .dmeta-n { color: var(--red); }
.dmeta.dr .dmeta-n { color: var(--gold); }
.detail-prog { margin-top: 16px; }
.detail-prog-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.detail-prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); transition: width .3s; }
.detail-prog-txt { font-size: 0.72rem; color: var(--muted); margin-top: 5px; font-family: 'Barlow Condensed', sans-serif; }

/* ─── DETAIL ACTIONS ─── */
.detail-actions {
  padding: 10px 24px; border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.act-btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.act-btn:hover { border-color: var(--green); color: var(--green); }
.act-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ─── STICKER GRID ─── */
.sticker-grid {
  padding: 24px; max-width: 900px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px;
}

.sticker {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 8px 10px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  transition: border-color 0.15s, background 0.15s; position: relative; overflow: hidden;
}
.sticker::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--border); transition: background .2s;
}
.sticker.s-have { background: var(--green-dim); border-color: #1a4a2a; }
.sticker.s-have::before { background: var(--green); }
.sticker.s-repeat { background: #1a1200; border-color: #3d2e00; }
.sticker.s-repeat::before { background: var(--gold); }

.sticker-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1;
  color: var(--muted); transition: color .2s;
}
.sticker.s-have .sticker-num { color: var(--green); }
.sticker.s-repeat .sticker-num { color: var(--gold); }

.sticker-status {
  font-family: 'Barlow Condensed', sans-serif; font-size: 0.64rem;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); min-height: 14px;
}
.sticker.s-have .sticker-status { color: var(--green); }
.sticker.s-repeat .sticker-status { color: var(--gold); }

.sticker-row { display: flex; align-items: center; gap: 3px; }
.sbtn {
  width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0;
}
.sbtn:hover { border-color: var(--gold); color: var(--gold); }
.sbtn.s-on { background: var(--green); border-color: var(--green); color: #000; font-weight: 700; }
.sbtn.r-on { background: var(--gold); border-color: var(--gold); color: #000; }
.srep-count {
  font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--gold);
  min-width: 18px; text-align: center; line-height: 1;
}

.empty { text-align: center; padding: 48px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.1em; grid-column: 1/-1; }

/* ─── BOLÃO ─── */
.bolao-bar{padding:10px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bp-btn{font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:7px 18px;border-radius:6px;border:2px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.bp-btn.nuno.sel{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.12)}
.bp-btn.patri.sel{border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,.12)}
.bolao-tabs{display:flex;gap:4px;margin-left:auto}
.btab{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.btab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.bfase-bar{padding:8px 24px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.bfase-btn{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.bfase-btn.active{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.bolao-content{padding:20px 24px;max-width:860px;margin:0 auto}
.grupo-lbl{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.jcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.jteam{display:flex;align-items:center;gap:6px}
.jteam.r{flex-direction:row-reverse}
.jflag{font-size:1.4rem;line-height:1}
.jname{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;line-height:1.2}
.jname.r{text-align:right}
.jmid{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:118px}
.jsrow{display:flex;align-items:center;gap:4px}
.sinp{width:34px;height:34px;text-align:center;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:1.2rem;outline:none;transition:border .15s}
.sinp:focus{border-color:var(--gold)}
.sinp:disabled{opacity:.5;cursor:default}
.ssep{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--muted)}
.rinp{width:30px;height:26px;text-align:center;background:transparent;border:1px dashed var(--blue);border-radius:4px;color:var(--blue);font-family:'Bebas Neue',sans-serif;font-size:.95rem;outline:none}
.rinp:focus{border-color:var(--blue)}
.jpts{font-family:'Bebas Neue',sans-serif;font-size:.78rem;padding:2px 8px;border-radius:4px;letter-spacing:.04em}
.jpts.p0{background:#111;color:var(--muted)}
.jpts.p1{background:#1a1200;color:#c08000;border:1px solid #3d2e00}
.jpts.p2{background:var(--green-dim);color:var(--green);border:1px solid #1a4a2a}
.jpts.p3{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid #1e3a6e}
.jpts.p5{background:rgba(245,197,24,.1);color:var(--gold);border:1px solid var(--gold-dim)}
.jpts.pend{color:var(--muted);font-size:.65rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;background:none}
.rank-wrap{padding:20px 24px;max-width:860px;margin:0 auto}
.rank-header{display:flex;gap:16px;margin-bottom:24px}
.rank-card{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center}
.rank-card.nuno{border-color:rgba(59,130,246,.4)}
.rank-card.patri{border-color:rgba(168,85,247,.4)}
.rank-pname{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.rank-pts{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;line-height:1}
.rank-pts.nuno{color:var(--blue)}
.rank-pts.patri{color:var(--purple)}
.rank-sub{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--muted);margin-top:4px}
.rank-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:16px}
.rank-table th{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 10px;border-bottom:1px solid var(--border);text-align:right}
.rank-table th:first-child{text-align:left}
.rank-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;font-family:'Barlow Condensed',sans-serif}
.rank-table td:first-child{text-align:left;font-size:.78rem;color:var(--muted)}
.bonus-wrap{padding:20px 24px;max-width:860px;margin:0 auto}
.bonus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px}
.bonus-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.bonus-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.bonus-pts-lbl{font-size:.68rem;color:var(--gold);font-family:'Barlow Condensed',sans-serif;margin-bottom:8px}
.bonus-sel{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'Barlow',sans-serif;font-size:.85rem;outline:none}
.bonus-sel:focus{border-color:var(--gold)}

/* ─── LOGIN ─── */
.login-wrap {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, #0d1f3c 0%, var(--bg) 70%);
}
.login-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px 36px; width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 14px; text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.12em; color: var(--gold); }
.login-sub { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: -8px; margin-bottom: 6px; }
.login-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 11px 14px; font-family: 'Barlow', sans-serif; font-size: 0.95rem;
  outline: none; transition: border .15s; width: 100%;
}
.login-input:focus { border-color: var(--gold); }
.login-btn {
  background: var(--gold); color: #000; border: none; border-radius: 8px;
  padding: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
  letter-spacing: 0.12em; cursor: pointer; transition: opacity .15s; margin-top: 4px;
}
.login-btn:hover { opacity: 0.85; }
.login-btn:disabled { opacity: 0.5; cursor: default; }
.login-err { font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem; color: var(--red); min-height: 18px; }

@media (max-width: 600px) {
  header { padding: 0 14px; }
  .header-stats { gap: 12px; }
  .hstat-n { font-size: 1.1rem; }
  main, .sticker-grid { padding: 14px; }
  .detail-hero { padding: 18px 14px; }
  .detail-flag { font-size: 3rem; }
  .detail-name { font-size: 2rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 7px; }
}
</style>
</head>
<body>

<!-- ═══ VIEW: LOGIN ═══ -->
<div class="view active" id="view-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">⚽ MUNDIAL 2026</div>
      <div class="login-sub">Nuno e Patricinha</div>
      <input class="login-input" id="login-user" type="text" placeholder="Utilizador" autocomplete="off">
      <div style="position:relative">
        <input class="login-input" id="login-pw" type="password" placeholder="Password" autocomplete="off"
          onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding-right:44px">
        <button type="button" onclick="togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem" id="pw-eye">👁</button>
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<header id="app-header" style="display:none">
  <div class="header-left">
    <button class="back-btn" id="back-btn" style="display:none" onclick="goHome()">← Voltar</button>
    <div class="logo" onclick="goHome()">⚽ MUNDIAL 2026 Nuno e Patricinha </div>
    <button class="back-btn" onclick="openBolao()" style="border-color:var(--purple);color:var(--purple)">🎲 Totobola</button>
  </div>
  <div class="header-stats">
    <div class="hstat h"><div class="hstat-n" id="g-have">0</div><div class="hstat-l">Tenho</div></div>
    <div class="hstat m"><div class="hstat-n" id="g-miss">0</div><div class="hstat-l">Faltam</div></div>
    <div class="hstat r"><div class="hstat-n" id="g-rep">0</div><div class="hstat-l">Repetidos</div></div>
    <div class="hstat p"><div class="hstat-n" id="g-pct">0%</div><div class="hstat-l">Completo</div></div>
  </div>
  <button class="back-btn" onclick="doLogout()" style="margin-left:8px">↩ Sair</button>
</header>
<div class="prog-bar-wrap" id="app-progbar" style="display:none"><div class="prog-bar-fill" id="g-prog" style="width:0%"></div></div>

<!-- ═══ VIEW: HOME ═══ -->

let state = {};

function loadLocalState() {
  try { state = JSON.parse(localStorage.getItem('mundial2026v2') || '{}'); } catch { state = {}; }
}

function saveState() {
  localStorage.setItem('mundial2026v2', JSON.stringify(state));
}

function showToast(msg, isError) {
  let t = document.getElementById('sb-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'sb-toast';
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:8px;font-family:Barlow Condensed,sans-serif;font-size:0.9rem;letter-spacing:0.05em;z-index:9999;transition:opacity .4s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = isError ? '#7f1d1d' : '#0d3320';
  t.style.color = isError ? '#fca5a5' : '#86efac';
  t.style.border = `1px solid ${isError ? '#ef4444' : '#22c55e'}`;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

async function pushLocalToSupabase() {
  const rows = [];
  Object.entries(state).forEach(([itemId, stickers]) => {
    Object.entries(stickers).forEach(([idx, s]) => {
      if (s.have || s.repeat > 0)
        rows.push({ item_id: itemId, sticker_idx: parseInt(idx), have: s.have, repeat_count: s.repeat || 0 });
    });
  });
  if (!rows.length) return;
  const { error } = await sb.from('cromos').upsert(rows, { onConflict: 'item_id,sticker_idx' });
  if (error) showToast('Erro ao ligar ao Supabase: ' + error.message, true);
  else showToast('Dados sincronizados com a nuvem ☁️', false);
}

async function syncFromSupabase() {
  const { data, error } = await sb.from('cromos').select('*');
  if (error) { showToast('Erro Supabase: ' + error.message, true); return; }
  if (data && data.length > 0) {
    state = {};
    data.forEach(row => {
      if (!state[row.item_id]) state[row.item_id] = {};
      state[row.item_id][row.sticker_idx] = { have: row.have, repeat: row.repeat_count };
    });
    localStorage.setItem('mundial2026v2', JSON.stringify(state));
    renderHome();
    if (currentItem) renderDetail();
    showToast('Sincronizado ☁️', false);
  } else {
    await pushLocalToSupabase();
  }
}

// ─── HELPERS ───────────────────────────────────────────────────
function getSticker(itemId, idx) {
  return (state[itemId] && state[itemId][idx]) ? state[itemId][idx] : { have: false, repeat: 0 };
}
function setSticker(itemId, idx, data) {
  if (!state[itemId]) state[itemId] = {};
  state[itemId][idx] = data;
  saveState();
  sb.from('cromos').upsert({
    item_id: itemId, sticker_idx: idx,
    have: data.have, repeat_count: data.repeat || 0
  }, { onConflict: 'item_id,sticker_idx' }).then(({ error }) => {
    if (error) showToast('Erro ao guardar: ' + error.message, true);
  });
}
function getItemStats(itemId) {
  const item = ALL_ITEMS.find(x => x.id === itemId);
  const total = (item && item.count) ? item.count : STICKER_COUNT;
  const startAt = (item && item.startAt !== undefined) ? item.startAt : 1;
  let have = 0, missing = 0, repeats = 0;
  for (let i = startAt; i < startAt + total; i++) {
    const s = getSticker(itemId, i);
    if (s.have) { have++; repeats += (s.repeat || 0); } else missing++;
  }
  return { have, missing, repeats, total };
}
function getGlobalStats() {
  let have = 0, missing = 0, repeats = 0, total = 0;
  ALL_ITEMS.forEach(item => {
    const st = getItemStats(item.id);
    have += st.have; missing += st.missing; repeats += st.repeats; total += st.total;
  });
  return { have, missing, repeats, total };
}

// ─── GLOBAL BAR ────────────────────────────────────────────────
function updateGlobalStats() {
  const { have, missing, repeats, total } = getGlobalStats();
  document.getElementById('g-have').textContent = have;
  document.getElementById('g-miss').textContent = missing;
  document.getElementById('g-rep').textContent = repeats;
  const pct = total ? Math.round((have / total) * 100) : 0;
  document.getElementById('g-pct').textContent = pct + '%';
  document.getElementById('g-prog').style.width = pct + '%';
}

// ─── HOME ──────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHome();
}

function cardHTML(item, isSpecial) {
  const { have, missing, repeats, total } = getItemStats(item.id);
  const pct = Math.round((have / total) * 100);
  const isComplete = have === total;
  const isPartial = have > 0 && !isComplete;

  const q = document.getElementById('search').value.toLowerCase();
  if (!(item.name + ' ' + (item.code || '')).toLowerCase().includes(q)) return '';

  if (currentFilter === 'complete' && !isComplete) return '';
  if (currentFilter === 'partial' && (have === 0 || isComplete)) return '';
  if (currentFilter === 'empty' && have > 0) return '';

  let cls = 'ccard' + (isComplete ? ' complete' : isPartial ? ' partial' : '');
  const icon = isSpecial ? `<div class="ccard-icon">${item.icon}</div>` : `<div class="ccard-flag">${item.flag}</div>`;
  const repBadge = repeats > 0 ? `<div class="ccard-repeats">+${repeats} rep</div>` : '';

  return `<div class="${cls}" onclick="openItem('${item.id}')">
    ${repBadge}${icon}
    <div class="ccard-name">${item.name}</div>
    <div class="ccard-code">${item.code || ''}</div>
    <div class="ccard-prog">
      <div class="ccard-prog-bar"><div class="ccard-prog-fill" style="width:${pct}%"></div></div>
      <div class="ccard-prog-txt">${have}/${total}${repeats > 0 ? ' · +'+repeats+' rep.' : ''}</div>
    </div>
  </div>`;
}

function renderHome() {
  const cCards = COUNTRIES.map(c => cardHTML(c, false)).join('');
  const sCards = SPECIALS.map(s => cardHTML(s, true)).join('');
  document.getElementById('countries-grid').innerHTML = cCards || '<div class="empty">Nenhum resultado</div>';
  document.getElementById('special-grid').innerHTML = sCards || '<div class="empty">Nenhum resultado</div>';

  const q = document.getElementById('search').value.toLowerCase();
  const cf = item => (item.name+' '+(item.code||'')).toLowerCase().includes(q);
  document.getElementById('c-count').textContent = `(${COUNTRIES.filter(cf).length} de ${COUNTRIES.length})`;
  document.getElementById('s-count').textContent = `(${SPECIALS.filter(cf).length} de ${SPECIALS.length})`;
  updateGlobalStats();
}

// ─── DETAIL ────────────────────────────────────────────────────
function openItem(id) {
  currentItem = ALL_ITEMS.find(x => x.id === id);
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('back-btn').style.display = 'flex';
  renderDetail();
  window.scrollTo(0, 0);
}

function goHome() {
  currentItem = null;
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-bolao').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  document.getElementById('back-btn').style.display = 'none';
  renderHome();
  window.scrollTo(0, 0);
}

function renderDetail() {
  const item = currentItem;
  const { have, missing, repeats, total } = getItemStats(item.id);
  const pct = Math.round((have / total) * 100);
  const icon = item.flag ? item.flag : item.icon;

  document.getElementById('detail-hero').innerHTML = `
    <div class="detail-flag">${icon}</div>
    <div class="detail-info">
      <div class="detail-name">${item.name}</div>
      <div class="detail-code">${item.code || ''}</div>
      <div class="detail-meta">
        <div class="dmeta dh"><div class="dmeta-n">${have}</div><div class="dmeta-l">Tenho</div></div>
        <div class="dmeta dm"><div class="dmeta-n">${missing}</div><div class="dmeta-l">Faltam</div></div>
        <div class="dmeta dr"><div class="dmeta-n">${repeats}</div><div class="dmeta-l">Repetidos</div></div>
      </div>
      <div class="detail-prog">
        <div class="detail-prog-bar"><div class="detail-prog-fill" style="width:${pct}%"></div></div>
        <div class="detail-prog-txt">${have} / ${total} cromos completados (${pct}%)</div>
      </div>
    </div>`;

  const itemCount = currentItem.count || STICKER_COUNT;
  const startAt = currentItem.startAt !== undefined ? currentItem.startAt : 1;
  let html = '';
  for (let i = startAt; i < startAt + itemCount; i++) {
    const s = getSticker(item.id, i);
    let cls = 'sticker';
    let statusTxt = 'Falta';
    if (s.have && s.repeat > 0) { cls += ' s-repeat'; statusTxt = `×${s.repeat + 1}`; }
    else if (s.have) { cls += ' s-have'; statusTxt = 'Tenho'; }

    html += `<div class="${cls}">
      <div class="sticker-num">${i}</div>
      <div class="sticker-status">${statusTxt}</div>
      <div class="sticker-row">
        <button class="sbtn ${s.have ? 's-on' : ''}" onclick="toggleSticker(${i})">${s.have ? '✓' : '○'}</button>
        <button class="sbtn ${s.repeat > 0 ? 'r-on' : ''}" onclick="changeRepeat(${i},-1)">−</button>
        <span class="srep-count">${s.repeat > 0 ? s.repeat : ''}</span>
        <button class="sbtn" onclick="changeRepeat(${i},1)">+</button>
      </div>
    </div>`;
  }
  document.getElementById('sticker-grid').innerHTML = html;
  updateGlobalStats();
}

function toggleSticker(idx) {
  const s = getSticker(currentItem.id, idx);
  s.have = !s.have;
  if (!s.have) s.repeat = 0;
  setSticker(currentItem.id, idx, s);
  renderDetail();
}

function changeRepeat(idx, delta) {
  const s = getSticker(currentItem.id, idx);
  if (delta > 0) { s.have = true; s.repeat = (s.repeat || 0) + 1; }
  else { s.repeat = Math.max(0, (s.repeat || 0) - 1); }
  setSticker(currentItem.id, idx, s);
  renderDetail();
}

function markAll(have) {
  const itemCount = currentItem.count || STICKER_COUNT;
  const startAt = currentItem.startAt !== undefined ? currentItem.startAt : 1;
  for (let i = startAt; i < startAt + itemCount; i++) {
    const s = getSticker(currentItem.id, i);
    s.have = have;
    if (!have) s.repeat = 0;
    setSticker(currentItem.id, i, s);
  }
  renderDetail();
}

function clearCountry() {
  if (!confirm(`Limpar todos os cromos de ${currentItem.name}?`)) return;
  state[currentItem.id] = {};
  saveState();
  renderDetail();
  sb.from('cromos').delete().eq('item_id', currentItem.id).then(({ error }) => {
    if (error) console.warn('Supabase delete error:', error);
  });
}

  {id:'QF_1',fase:'quartos',casa:'V R16_01',fora:'V R16_02'},{id:'QF_2',fase:'quartos',casa:'V R16_03',fora:'V R16_04'},
  {id:'QF_3',fase:'quartos',casa:'V R16_05',fora:'V R16_06'},{id:'QF_4',fase:'quartos',casa:'V R16_07',fora:'V R16_08'},
  {id:'SF_1',fase:'meias',casa:'V QF_1',fora:'V QF_2'},{id:'SF_2',fase:'meias',casa:'V QF_3',fora:'V QF_4'},
  {id:'3RD',fase:'terceiro',casa:'P SF_1',fora:'P SF_2'},
  {id:'FINAL',fase:'final',casa:'V SF_1',fora:'V SF_2'},
];
const TODOS_JOGOS = [...gerarJogosGrupo(), ...JOGOS_KO];

// ─── BOLÃO STATE ───────────────────────────────────────────────
let bolaoPlayer = null;
let bolaoTab = 'jogos';
let bolaoFase = 'grupo';
let bolaoApostas = {nuno:{},patricinha:{}};
let bolaoResultados = {};
let bolaoBonus = {nuno:{},patricinha:{}};
let adminMode = false;

function calcPontos(ph,pa,rh,ra,mult) {
  if(ph===null||pa===null||rh===null||ra===null) return null;
  if(ph===rh&&pa===ra) return 5*mult;
  const pd=ph-pa,rd=rh-ra,pw=Math.sign(pd),rw=Math.sign(rd);
  if(pw===rw&&pd===rd) return 3*mult;
  if(pw===rw) return 2*mult;
  if(ph===rh||pa===ra) return 1*mult;
  return 0;
}
function getTeamInfo(id) {
  const c = COUNTRIES.find(x=>x.id===id);
  return c ? {flag:c.flag,name:c.name} : {flag:'',name:id};
}
function getFaseMult(fase) { return (FASES.find(f=>f.id===fase)||{mult:1}).mult; }

function openBolao() {
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('back-btn').style.display='flex';
  document.getElementById('view-bolao').classList.add('active');
  syncBolaoFromSupabase();
  renderBolaoFaseBar();
  renderBolaoJogos();
}
function setBolaoPlayer(p) {
  bolaoPlayer = p;
  document.getElementById('bp-nuno').classList.toggle('sel',p==='nuno');
  document.getElementById('bp-patri').classList.toggle('sel',p==='patricinha');
  renderBolaoJogos();
  if(bolaoTab==='ranking') renderBolaoRanking();
  if(bolaoTab==='bonus') renderBolaoBonus();
}
function setBolaoTab(tab) {
  bolaoTab = tab;
  ['jogos','ranking','bonus'].forEach(t=>{
    document.getElementById(`bt-${t}-content`).style.display=t===tab?'':'none';
    document.getElementById(`bt-${t}`).classList.toggle('active',t===tab);
  });
  if(tab==='ranking') renderBolaoRanking();
  if(tab==='bonus') renderBolaoBonus();
  if(tab==='jogos') { renderBolaoFaseBar(); renderBolaoJogos(); }
}
function setBolaoFase(fase) {
  bolaoFase = fase;
  document.querySelectorAll('.bfase-btn').forEach(b=>b.classList.toggle('active',b.dataset.fase===fase));
  renderBolaoJogos();
}
function toggleAdmin() {
  adminMode = !adminMode;
  const btn = document.getElementById('admin-toggle');
  btn.textContent = adminMode ? '🔐 Fechar' : '⚙️ Resultados';
  btn.style.borderColor = adminMode ? 'var(--blue)' : '';
  btn.style.color = adminMode ? 'var(--blue)' : '';
  renderBolaoJogos();
}
function renderBolaoFaseBar() {
  document.getElementById('bfase-bar').innerHTML = FASES.map(f=>
    `<button class="bfase-btn${f.id===bolaoFase?' active':''}" data-fase="${f.id}" onclick="setBolaoFase('${f.id}')">
      ${f.nome} <span style="opacity:.55;font-size:.65rem">×${f.mult}</span></button>`
  ).join('');
}
function renderBolaoJogos() {
  const jogos = TODOS_JOGOS.filter(j=>j.fase===bolaoFase);
  const c = document.getElementById('bolao-games');
  if(bolaoFase==='grupo') {
    const groups = {};
    jogos.forEach(j=>{if(!groups[j.grupo])groups[j.grupo]=[];groups[j.grupo].push(j);});
    c.innerHTML = Object.entries(groups).map(([g,gj])=>
      `<div class="grupo-lbl">Grupo ${g}</div>`+gj.map(j=>jogoCardHTML(j)).join('')
    ).join('');
  } else {
    c.innerHTML = jogos.map(j=>jogoCardHTML(j)).join('')||'<div class="empty">Sem jogos nesta fase</div>';
  }
}
function jogoCardHTML(jogo) {
  const mult=getFaseMult(jogo.fase);
  const casa=getTeamInfo(jogo.casa), fora=getTeamInfo(jogo.fora);
  const res=bolaoResultados[jogo.id];
  const ap=bolaoPlayer?(bolaoApostas[bolaoPlayer]||{})[jogo.id]:null;
  const rh=res!=null?res.casa:null, ra=res!=null?res.fora:null;
  const ph=ap!=null?ap.casa:null, pa=ap!=null?ap.fora:null;
  const pts=res!=null?calcPontos(ph,pa,rh,ra,mult):null;
  const ptsHTML=pts===null
    ?`<span class="jpts pend">sem resultado</span>`
    :`<span class="jpts ${pts>=5*mult?'p5':pts>=3*mult?'p3':pts>=2*mult?'p2':pts>=1?'p1':'p0'}">${pts} pts</span>`;
  const resultHTML=res!=null
    ?`<div class="jsrow" style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--blue)">${res.casa} — ${res.fora}</div>`
    :adminMode?`<div class="jsrow">
        <input class="rinp" type="number" min="0" max="30" placeholder="?" id="rh_${jogo.id}" onchange="saveResultado('${jogo.id}')">
        <span class="ssep" style="color:var(--blue)">-</span>
        <input class="rinp" type="number" min="0" max="30" placeholder="?" id="ra_${jogo.id}" onchange="saveResultado('${jogo.id}')">
      </div>`:'';
  return `<div class="jcard">
    <div class="jteam"><span class="jflag">${casa.flag}</span><span class="jname">${casa.name}</span></div>
    <div class="jmid">
      <div class="jsrow">
        <input class="sinp" type="number" min="0" max="30" placeholder="-" id="ph_${jogo.id}"
          ${ph!==null?`value="${ph}"`:''}${!bolaoPlayer||res!=null?' disabled':''}
          onchange="saveAposta('${jogo.id}')">
        <span class="ssep">×</span>
        <input class="sinp" type="number" min="0" max="30" placeholder="-" id="pa_${jogo.id}"
          ${pa!==null?`value="${pa}"`:''}${!bolaoPlayer||res!=null?' disabled':''}
          onchange="saveAposta('${jogo.id}')">
      </div>
      ${resultHTML}
      ${ptsHTML}
    </div>
    <div class="jteam r"><span class="jflag">${fora.flag}</span><span class="jname r">${fora.name}</span></div>
  </div>`;
}
function saveAposta(jogoId) {
  if(!bolaoPlayer) return;
  const h=parseInt(document.getElementById(`ph_${jogoId}`)?.value);
  const a=parseInt(document.getElementById(`pa_${jogoId}`)?.value);
  if(isNaN(h)||isNaN(a)) return;
  if(!bolaoApostas[bolaoPlayer]) bolaoApostas[bolaoPlayer]={};
  bolaoApostas[bolaoPlayer][jogoId]={casa:h,fora:a};
  sb.from('bolao_apostas').upsert({jogador:bolaoPlayer,jogo_id:jogoId,golo_casa:h,golo_fora:a},{onConflict:'jogador,jogo_id'})
    .then(({error})=>{if(error)showToast('Erro: '+error.message,true);});
}
function saveResultado(jogoId) {
  const h=parseInt(document.getElementById(`rh_${jogoId}`)?.value);
  const a=parseInt(document.getElementById(`ra_${jogoId}`)?.value);
  if(isNaN(h)||isNaN(a)) return;
  bolaoResultados[jogoId]={casa:h,fora:a};
  sb.from('bolao_resultados').upsert({jogo_id:jogoId,golo_casa:h,golo_fora:a},{onConflict:'jogo_id'})
    .then(({error})=>{if(error)showToast('Erro: '+error.message,true);else renderBolaoJogos();});
}
function getTotalPts(player) {
  return TODOS_JOGOS.reduce((sum,j)=>{
    const res=bolaoResultados[j.id], ap=(bolaoApostas[player]||{})[j.id];
    if(!res||!ap) return sum;
    return sum+(calcPontos(ap.casa,ap.fora,res.casa,res.fora,getFaseMult(j.fase))||0);
  },0);
}
function renderBolaoRanking() {
  const nPts=getTotalPts('nuno'), pPts=getTotalPts('patricinha');
  const jogados=TODOS_JOGOS.filter(j=>bolaoResultados[j.id]).length;
  const rows=FASES.map(f=>{
    const fj=TODOS_JOGOS.filter(j=>j.fase===f.id&&bolaoResultados[j.id]);
    if(!fj.length) return null;
    const calc=(pl)=>fj.reduce((s,j)=>{const a=(bolaoApostas[pl]||{})[j.id],r=bolaoResultados[j.id];return s+(a?calcPontos(a.casa,a.fora,r.casa,r.fora,f.mult)||0:0);},0);
    return {nome:f.nome,n:calc('nuno'),p:calc('patricinha'),jogos:fj.length};
  }).filter(Boolean);
  document.getElementById('bolao-rank').innerHTML=`
    <div class="rank-header">
      <div class="rank-card nuno"><div class="rank-pname">Nuno</div><div class="rank-pts nuno">${nPts}</div><div class="rank-sub">pontos</div></div>
      <div class="rank-card patri"><div class="rank-pname">Patricinha</div><div class="rank-pts patri">${pPts}</div><div class="rank-sub">pontos</div></div>
    </div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${jogados} jogo${jogados!==1?'s':''} com resultado inserido</div>
    ${rows.length?`<table class="rank-table">
      <thead><tr><th>Fase</th><th>Jogos</th><th style="color:var(--blue)">Nuno</th><th style="color:var(--purple)">Patricinha</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr><td>${r.nome}</td><td>${r.jogos}</td><td style="color:var(--blue);font-weight:700">${r.n}</td><td style="color:var(--purple);font-weight:700">${r.p}</td></tr>`).join('')}
        <tr style="border-top:2px solid var(--border2)"><td><strong>Total</strong></td><td>${jogados}</td>
          <td style="color:var(--blue);font-family:'Bebas Neue',sans-serif;font-size:1.2rem">${nPts}</td>
          <td style="color:var(--purple);font-family:'Bebas Neue',sans-serif;font-size:1.2rem">${pPts}</td></tr>
      </tbody></table>`:'<div class="empty">Ainda sem resultados inseridos</div>'}`;
}
function renderBolaoBonus() {
  const player=bolaoPlayer, myB=player?(bolaoBonus[player]||{}):{};
  const teamOpts=COUNTRIES.map(c=>`<option value="${c.id}">${c.flag} ${c.name}</option>`).join('');
  document.getElementById('bolao-bonus-content').innerHTML=`
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px">
      ${player?`A editar: <strong style="color:${player==='nuno'?'var(--blue)':'var(--purple)'}">${player==='nuno'?'Nuno':'Patricinha'}</strong>`:'Seleciona um jogador em cima'}
    </div>
    <div class="bonus-grid">
      ${BONUS_ITEMS.map(b=>`<div class="bonus-card">
        <div class="bonus-lbl">${b.nome}</div>
        <div class="bonus-pts-lbl">+${b.pts} pontos</div>
        ${b.tipo==='team'
          ?`<select class="bonus-sel" id="bns_${b.id}" ${!player?'disabled':''} onchange="saveBonus('${b.id}')">
              <option value="">— Escolher —</option>${teamOpts}</select>`
          :`<input class="bonus-sel" type="text" id="bns_${b.id}" placeholder="Nome do jogador" ${!player?'disabled':''} onchange="saveBonus('${b.id}')">`
        }</div>`).join('')}
    </div>
    <div style="margin-top:8px">
      ${BONUS_ITEMS.map(b=>{
        const nv=bolaoBonus.nuno?.[b.id]||'—', pv=bolaoBonus.patricinha?.[b.id]||'—';
        const nName=b.tipo==='team'?((COUNTRIES.find(c=>c.id===nv)||{}).flag||'')+' '+((COUNTRIES.find(c=>c.id===nv)||{}).name||nv):nv;
        const pName=b.tipo==='team'?((COUNTRIES.find(c=>c.id===pv)||{}).flag||'')+' '+((COUNTRIES.find(c=>c.id===pv)||{}).name||pv):pv;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:.82rem">
          <span style="color:var(--muted)">${b.nome}</span>
          <div style="display:flex;gap:20px">
            <span style="color:var(--blue)">Nuno: ${nName}</span>
            <span style="color:var(--purple)">Patri: ${pName}</span>
          </div></div>`;
      }).join('')}
    </div>`;
  if(player) BONUS_ITEMS.forEach(b=>{const el=document.getElementById(`bns_${b.id}`);if(el&&myB[b.id])el.value=myB[b.id];});
}
function saveBonus(tipo) {
  if(!bolaoPlayer) return;
  const el=document.getElementById(`bns_${tipo}`);
  if(!el) return;
  if(!bolaoBonus[bolaoPlayer]) bolaoBonus[bolaoPlayer]={};
  bolaoBonus[bolaoPlayer][tipo]=el.value;
  sb.from('bolao_bonus').upsert({jogador:bolaoPlayer,tipo,valor:el.value},{onConflict:'jogador,tipo'})
    .then(({error})=>{if(error)showToast('Erro: '+error.message,true);});
}
async function limparResultados() {
  if (!confirm('Apagar todos os resultados inseridos?')) return;
  bolaoResultados = {};
  const { error } = await sb.from('bolao_resultados').delete().neq('jogo_id','__none__');
  if (error) showToast('Erro: ' + error.message, true);
  else { showToast('Resultados apagados', false); renderBolaoJogos(); }
}

async function syncBolaoFromSupabase() {
  const [a,r,b]=await Promise.all([
    sb.from('bolao_apostas').select('*'),
    sb.from('bolao_resultados').select('*'),
    sb.from('bolao_bonus').select('*'),
  ]);
  if(!a.error&&a.data){bolaoApostas={nuno:{},patricinha:{}};a.data.forEach(x=>{if(!bolaoApostas[x.jogador])bolaoApostas[x.jogador]={};bolaoApostas[x.jogador][x.jogo_id]={casa:x.golo_casa,fora:x.golo_fora};});}
  if(!r.error&&r.data){bolaoResultados={};r.data.forEach(x=>{bolaoResultados[x.jogo_id]={casa:x.golo_casa,fora:x.golo_fora};});}
  if(!b.error&&b.data){bolaoBonus={nuno:{},patricinha:{}};b.data.forEach(x=>{if(!bolaoBonus[x.jogador])bolaoBonus[x.jogador]={};bolaoBonus[x.jogador][x.tipo]=x.valor;});}
  renderBolaoJogos();
  if(bolaoTab==='ranking') renderBolaoRanking();
  if(bolaoTab==='bonus') renderBolaoBonus();
}

// ─── AUTH ──────────────────────────────────────────────────────
function showApp() {
  document.getElementById('view-login').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-progbar').style.display = 'block';
  loadLocalState();
  renderHome();
  syncFromSupabase();
}

function togglePw() {
  const input = document.getElementById('login-pw');
  const eye = document.getElementById('pw-eye');
  if (input.type === 'password') { input.type = 'text'; eye.textContent = '🙈'; }
  else { input.type = 'password'; eye.textContent = '👁'; }
}

function doLogout() {
  localStorage.removeItem('mundial_auth');
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('app-progbar').style.display = 'none';
  document.getElementById('view-login').classList.add('active');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('login-err').textContent = '';
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const err = document.getElementById('login-err');

  if (user === 'cromos' && pw === 'np2806') {
    localStorage.setItem('mundial_auth', '1');
    showApp();
  } else {
    err.textContent = 'Utilizador ou password incorretos.';
  }
}

// ─── INIT ──────────────────────────────────────────────────────
if (localStorage.getItem('mundial_auth') === '1') {
  showApp();
}
</script>
